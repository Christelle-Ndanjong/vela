<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VELA — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090F; --surface: #111827; --card: #0E1521;
      --border: rgba(255,255,255,0.07); --accent: #00E5A0;
      --text: #EEF2FF; --muted: #64748B;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; background: linear-gradient(135deg, #00E5A0, #0096FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.5rem; text-align: center; }
    .tagline { font-size: 0.85rem; color: var(--muted); margin-bottom: 2.5rem; text-align: center; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; }
    .card-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 0.5rem; }
    .card-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
    .form-group { margin-bottom: 1.1rem; }
    .form-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
    .form-input { width: 100%; background: var(--surface); border: 1.5px solid var(--border); color: var(--text); padding: 0.75rem 1rem; border-radius: 10px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: rgba(0,229,160,0.4); }
    .btn-submit { width: 100%; background: var(--accent); color: #07090F; border: none; padding: 0.85rem; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s; }
    .btn-submit:hover { opacity: 0.88; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { text-align: center; font-size: 0.82rem; margin-top: 1rem; min-height: 1.2rem; }
    .msg.error { color: #FF6B6B; }
    .msg.success { color: var(--accent); }
    .back-link { text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--muted); }
    .back-link a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<div class="logo">VELA</div>
<div class="tagline">African Talent. Verified. Placed.</div>

<div class="card">
  <div class="card-title">🔐 Set New Password</div>
  <div class="card-sub">Enter a new password for your VELA account.</div>

  <div id="form-reset">
    <div class="form-group">
      <label class="form-label">New Password</label>
      <div style="position:relative">
        <input type="password" class="form-input" id="new-password" placeholder="At least 6 characters" style="padding-right:2.8rem"/>
        <span onclick="togglePwd('new-password',this)" style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:0.85rem;">👁</span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm New Password</label>
      <div style="position:relative">
        <input type="password" class="form-input" id="confirm-password" placeholder="Repeat your password" style="padding-right:2.8rem"/>
        <span onclick="togglePwd('confirm-password',this)" style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:0.85rem;">👁</span>
      </div>
    </div>
    <button class="btn-submit" id="btn-reset" onclick="handleReset()">Update Password →</button>
    <div class="msg" id="reset-msg"></div>
  </div>

  <div id="form-invalid" style="display:none;text-align:center;">
    <p style="color:#FF6B6B;font-size:0.9rem;margin-bottom:1.25rem;">This reset link has expired or is invalid.</p>
    <a href="login.html" style="color:var(--accent);font-size:0.9rem;font-weight:600;text-decoration:none;">← Go back to Sign In</a>
  </div>
</div>

<div class="back-link"><a href="login.html">← Back to Sign In</a></div>

<script>
const SUPABASE_URL = window.VELA_CONFIG.SUPABASE_URL;
const SUPABASE_KEY = window.VELA_CONFIG.SUPABASE_KEY;
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Check for valid recovery token
_supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Valid reset link — show form
    document.getElementById('form-reset').style.display = 'block';
    document.getElementById('form-invalid').style.display = 'none';
  }
});

// Check session on load
window.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session && !window.location.hash.includes('access_token')) {
    document.getElementById('form-reset').style.display = 'none';
    document.getElementById('form-invalid').style.display = 'block';
  }
});

async function handleReset() {
  const newPwd = document.getElementById('new-password').value;
  const confirmPwd = document.getElementById('confirm-password').value;
  const msg = document.getElementById('reset-msg');
  const btn = document.getElementById('btn-reset');

  if (!newPwd || !confirmPwd) { msg.className = 'msg error'; msg.textContent = 'Please fill in both fields.'; return; }
  if (newPwd.length < 6) { msg.className = 'msg error'; msg.textContent = 'Password must be at least 6 characters.'; return; }
  if (newPwd !== confirmPwd) { msg.className = 'msg error'; msg.textContent = 'Passwords do not match.'; return; }

  btn.disabled = true; btn.textContent = 'Updating...';
  const { error } = await _supabase.auth.updateUser({ password: newPwd });

  if (error) {
    msg.className = 'msg error'; msg.textContent = error.message;
    btn.disabled = false; btn.textContent = 'Update Password →';
  } else {
    msg.className = 'msg success';
    msg.textContent = '✅ Password updated! Redirecting to your profile...';
    setTimeout(() => window.location.href = 'profile.html', 2000);
  }
}

function togglePwd(id, el) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
  el.textContent = input.type === 'password' ? '👁' : '🙈';
}
</script>
</body>
</html>
