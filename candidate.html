    html,body{overflow-x:hidden;max-width:100%;}
    :root {
      --navy:         #0b1f3a;
      --navy-mid:     #112d52;
      --navy-light:   #1a3f6e;
      --orange:       #f0650e;
      --orange-light: #ff8a3d;
      --orange-pale:  #fff1e8;
      --bg:           #fdf8f3;
      --bg2:          #f5efe6;
      --surface:      #ffffff;
      --card:         #ffffff;
      --border:       rgba(11,31,58,0.10);
      --accent:       #f0650e;
      --accent2:      #1a3f6e;
      --gold:         #f0650e;
      --text:         #0b1f3a;
      --text2:        #4a6080;
      --muted:        #8ea5be;
      --danger:       #EF4444;
      --warn:         #f0650e;
      --grad1:        #f0650e;
      --grad2:        #ff8a3d;
    }
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
    /* light mode removed — VELA is dark */

    /* NAV */

    body.light-mode nav{background:rgba(245,240,232,0.95);}
    .logo-wrap{display:flex;align-items:center;gap:0.75rem;text-decoration:none;}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:0.08em;color: #ffffff;}
    .logo-tag{font-size:0.65rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent2);background:rgba(45,107,228,0.1);border:1px solid rgba(45,107,228,0.2);padding:0.2rem 0.5rem;border-radius:4px;}
    .nav-right{display:flex;gap:0.6rem;align-items:center;}
    .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.25);color:#ffffff;padding:0.4rem 0.9rem;border-radius:7px;font-size:0.8rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all 0.2s;}
    .btn-ghost:hover{border-color:var(--orange);color:var(--text);}
    .btn-hire{background:var(--orange);color:#fff;border:none;padding:0.5rem 1.25rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;transition:opacity 0.2s;}
    .btn-hire:hover{opacity:0.88;}

    /* LAYOUT */
    .page{max-width:1120px;margin:0 auto;padding:2rem 5% 5rem;display:grid;grid-template-columns:1fr 320px;gap:1.5rem;align-items:start;}
    .left{display:flex;flex-direction:column;gap:1.25rem;}
    .right{display:flex;flex-direction:column;gap:1.1rem;position:sticky;top:80px;}

    /* HERO CARD */
    .hero-card{background:linear-gradient(145deg,var(--card),var(--bg2));border:1.5px solid var(--border);border-radius:20px;padding:2rem;position:relative;overflow:hidden;}
    .hero-card::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(240,101,14,0.06),transparent 70%);border-radius:50%;pointer-events:none;}
    .hero-top{display:flex;align-items:flex-start;gap:1.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
    .hero-avatar{width:88px;height:88px;border-radius:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;color:#000;position:relative;}
    .verified-ring{position:absolute;bottom:-6px;right:-6px;width:24px;height:24px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:0.7rem;}
    .hero-info{flex:1;min-width:200px;}
    .hero-name{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;color:var(--text);line-height:1.1;margin-bottom:0.3rem;}
    .hero-role{font-size:1rem;color:var(--accent);font-weight:600;margin-bottom:0.6rem;}
    .hero-meta{display:flex;gap:0.75rem;flex-wrap:wrap;}
    .hero-meta-item{display:flex;align-items:center;gap:0.35rem;font-size:0.8rem;color:var(--muted);}

    /* VELA VERIFIED MASTER BADGE */
    .vela-master-badge{display:flex;align-items:center;gap:1rem;background:linear-gradient(135deg,rgba(245,166,35,0.08),rgba(240,101,14,0.06));border:1.5px solid rgba(245,166,35,0.25);border-radius:14px;padding:1rem 1.25rem;margin-top:1.25rem;}
    .vmb-seal{width:48px;height:48px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;box-shadow:0 4px 16px rgba(245,166,35,0.25);}
    .vmb-info{flex:1;}
    .vmb-title{font-family:'Syne',sans-serif;font-weight:800;font-size:0.88rem;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.2rem;}
    .vmb-score{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--text);line-height:1;}
    .vmb-tier{font-size:0.75rem;font-weight:600;color:var(--muted);}
    .vmb-layers{display:flex;flex-wrap:wrap;gap:0.3rem;}
    .vmb-layer{font-size:0.62rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;padding:0.2rem 0.55rem;border-radius:20px;border:1px solid;}

    /* SECTION CARD */
    .section-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;}
    .section-header{padding:1rem 1.25rem;border-bottom:2px solid var(--orange);display:flex;align-items:center;gap:0.5rem;}
    .section-icon{font-size:1rem;}
    .section-title{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;color:var(--text);}
    .section-body{padding:1.25rem;}

    /* SUMMARY */
    .bio-text{font-size:0.9rem;color:var(--muted);line-height:1.75;}

    /* SKILLS */
    .skill-chips{display:flex;flex-wrap:wrap;gap:0.5rem;}
    .skill-chip{background:var(--border);border:1px solid var(--border);color:#FFFFFF;font-size:0.8rem;font-weight:600;padding:0.3rem 0.8rem;border-radius:20px;}

    /* EXPERIENCE */
    .exp-item{padding-bottom:1rem;margin-bottom:1rem;border-bottom:2px solid var(--orange);}
    .exp-item:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0;}
    .exp-role{font-family:'Syne',sans-serif;font-weight:700;font-size:0.92rem;color:var(--text);margin-bottom:0.15rem;}
    .exp-company{font-size:0.82rem;color:var(--accent);font-weight:600;margin-bottom:0.15rem;}
    .exp-period{font-size:0.75rem;color:var(--muted);}
    .exp-bullets{margin-top:0.6rem;padding-left:1rem;}
    .exp-bullets li{font-size:0.82rem;color:var(--muted);line-height:1.6;margin-bottom:0.25rem;}

    /* PORTFOLIO */
    .portfolio-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem;}
    .port-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem;transition:border-color 0.2s;cursor:pointer;}
    .port-card:hover{border-color:rgba(240,101,14,0.3);}
    .port-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:var(--text);margin-bottom:0.3rem;}
    .port-tools{font-size:0.75rem;color:var(--muted);}
    .port-link{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.75rem;font-weight:700;color:var(--accent);margin-top:0.5rem;text-decoration:none;}

    /* TEST RESULTS */
    .test-row{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:2px solid var(--orange);}
    .test-row:last-child{border-bottom:none;}
    .test-layer-icon{font-size:1.1rem;flex-shrink:0;}
    .test-name{flex:1;font-size:0.85rem;font-weight:600;color:var(--text);}
    .test-bar-wrap{width:100px;flex-shrink:0;}
    .test-bar-track{height:4px;background:var(--surface);border-radius:100px;overflow:hidden;}
    .test-bar-fill{height:100%;border-radius:100px;}
    .test-score-label{font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:800;width:36px;text-align:right;flex-shrink:0;}

    /* VIDEO */
    .video-slot{background:var(--surface);border:1.5px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;}
    .video-slot-icon{font-size:2.5rem;margin-bottom:0.5rem;}
    .video-slot-text{font-size:0.85rem;color:var(--muted);line-height:1.6;}

    /* REMOTE READINESS */
    .remote-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
    .remote-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.85rem;}
    .remote-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.3rem;}
    .remote-val{font-size:0.88rem;font-weight:600;color:var(--text);}

    .action-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:1.25rem;}

    .score-big{font-family:'Syne',sans-serif;font-size:3.5rem;font-weight:800;line-height:1;}
    .score-100{font-size:1rem;color:var(--muted);}
    .score-tier-pill{display:inline-block;font-size:0.72rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:0.3rem 0.85rem;border-radius:20px;margin-top:0.4rem;}
    .btn-request{width:100%;background:var(--orange);color:#fff;border:none;padding:0.9rem;border-radius:10px;font-family:'Syne',sans-serif;font-weight:800;font-size:0.92rem;cursor:pointer;transition:opacity 0.2s;margin-bottom:0.6rem;}
    .btn-request:hover{opacity:0.88;}
    .btn-shortlist{width:100%;background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:0.8rem;border-radius:10px;font-family:'Syne',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all 0.2s;}
    .btn-shortlist:hover{border-color:var(--orange);color:var(--accent);}
    .btn-shortlist.active{border-color:rgba(240,101,14,0.4);color:var(--accent);background:rgba(240,101,14,0.06);}
    .quick-fact{display:flex;justify-content:space-between;align-items:center;padding:0.55rem 0;border-bottom:2px solid var(--orange);font-size:0.82rem;}
    .quick-fact:last-child{border-bottom:none;}
    .qf-label{color:var(--muted);}
    .qf-val{font-weight:600;color:var(--text);text-align:right;}

    /* SIMILAR */
    .similar-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:inherit;transition:border-color 0.2s;margin-bottom:0.5rem;}
    .similar-item:hover{border-color:rgba(240,101,14,0.3);}
    .similar-avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.75rem;color:#000;}
    .sim-name{font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;color:var(--text);}
    .sim-meta{font-size:0.7rem;color:var(--muted);}
    .sim-score{font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:800;margin-left:auto;flex-shrink:0;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp 0.35s ease both;}

    @media(max-width:900px){
      .page{grid-template-columns:1fr;}
      .right{position:static;}
    }
    @media(max-width:640px){
      html,body{overflow-x:hidden;}
      .page{padding:1.25rem 4% 4rem;}
      .portfolio-grid{grid-template-columns:1fr;}
      .remote-grid{grid-template-columns:1fr;}
      .hero-name{font-size:1.35rem;}
      .hero-top{gap:1rem;}
      .hero-avatar{width:70px;height:70px;font-size:1.5rem;}
      .vela-master-badge{flex-direction:column;gap:0.75rem;text-align:center;}
      .vmb-layers{justify-content:center;}
      nav{padding:0.75rem 4%;}
      .nav-right{gap:0.4rem;}
      .btn-hire{padding:0.4rem 0.9rem;font-size:0.78rem;}
    }
    @media(max-width:400px){
      .hero-name{font-size:1.2rem;}
      .vmb-score{font-size:1.1rem;}
    }
  </style>

const AVAIL_LABELS = {fulltime:"Full-time (30–40h/week)",parttime:"Part-time (10–20h/week)",flexible:"Flexible hours"};
const EXP_LABELS   = {none:"No prior experience",less1:"Under 1 year","1to3":"1–3 years","3plus":"3+ years"};
const EDU_LABELS   = {secondary:"Secondary School",diploma:"Diploma / HND",bachelor:"Bachelor's Degree",master:"Master's Degree",phd:"PhD / Doctorate"};
const SCORE_TIER   = (s) => s >= 90 ? {label:"Elite Talent", color:"#F5A623"} : s >= 80 ? {label:"Highly Qualified", color:"#f0650e"} : s >= 70 ? {label:"Qualified", color:"#2D6BE4"} : {label:"Developing", color:"#7A8AAD"};

let candidate = null;

function init() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get("id")) || 1;
  candidate = CANDIDATES.find(function(c){ return c.id === id; }) || CANDIDATES[0];
  renderProfile();
}

function renderProfile() {
  var c = candidate;
  var colorIdx = c.id % AVATAR_COLORS.length;
  var bg = AVATAR_COLORS[colorIdx][0];
  var initials = c.name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
  var verifPassed = Object.values(c.verif).filter(function(v){return v.s==="pass";}).length;
  var tier = SCORE_TIER(c.score); // uses #3B82F6 for score display
  var allVerified = verifPassed === 5;

  var LAYER_ORDER = ["video","comm","task","tools","interview"];

  // Build verification layer pills
  var layerPills = LAYER_ORDER.map(function(key) {
    var meta = VERIF_LAYER_META[key];
    var st = c.verif[key] && c.verif[key].s;
    var isPassed = st === "pass";
    var style = isPassed
      ? "border-color:" + meta.color + "50;color:" + meta.color + ";background:" + meta.color + "18;"
      : "border-color:var(--border);color:var(--muted);background:transparent;opacity:0.5;";
    return "<span class=\"vmb-layer\" style=\"display:inline-flex;align-items:center;gap:0.3rem;" + style + "\">" + (isPassed ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>' : "○") + " " + meta.title + "</span>";
  }).join("");

  // Build test results rows
  var testRows = LAYER_ORDER.map(function(key) {
    var meta = VERIF_LAYER_META[key];
    var st = c.verif[key] && c.verif[key].s;
    var score = c.verif[key] && c.verif[key].score;
    var isPassed = st === "pass";
    var pct = score || (isPassed ? 80 : 0);
    var color = pct >= 85 ? "var(--accent)" : pct >= 70 ? "var(--accent2)" : "var(--warn)";
    return "<div class=\"test-row\">" +
      "<span class=\"test-layer-icon\" style=\"color:" + (isPassed ? meta.color : "var(--muted)") + "\">" + meta.svg + "</span>" +
      "<span class=\"test-name\">" + meta.title + "</span>" +
      (isPassed ? "<div class=\"test-bar-wrap\"><div class=\"test-bar-track\"><div class=\"test-bar-fill\" style=\"width:" + pct + "%;background:" + color + ";\"></div></div></div>" +
      "<span class=\"test-score-label\" style=\"color:" + color + "\">" + pct + "%</span>"
      : "<span style=\"font-size:0.72rem;color:var(--muted);margin-left:auto\">Pending</span>") +
    "</div>";
  }).join("");

  // Similar candidates
  var similar = CANDIDATES.filter(function(x){ return x.id !== c.id && x.skill === c.skill; }).slice(0,3);
  var similarHTML = similar.map(function(s) {
    var sTier = SCORE_TIER(s.score);
    var si = s.id % AVATAR_COLORS.length;
    var sbg = AVATAR_COLORS[si][0];
    var sins = s.name.split(" ").map(function(w){return w[0];}).join("").slice(0,2).toUpperCase();
    return "<a class=\"similar-item\" href=\"candidate.html?id=" + s.id + "\">" +
      "<div class=\"similar-avatar\" style=\"background:" + sbg + "22;border:1.5px solid " + sbg + "44;color:" + sbg + "\">" + sins + "</div>" +
      "<div><div class=\"sim-name\">" + s.name + "</div><div class=\"sim-meta\">📍 " + s.country + "</div></div>" +
      "<span class=\"sim-score\" style=\"color:" + sTier.color + "\">" + s.score + "</span>" +
    "</a>";
  }).join("");

  var html = "<!-- LEFT --><div class=\"left fade-up\">" +

  // ── HERO CARD ──────────────────────────────────────────────────────────────
  "<div class=\"hero-card\">" +
    "<div class=\"hero-top\">" +
      "<div class=\"hero-avatar\" style=\"background:linear-gradient(135deg," + bg + "22," + bg + "44);border:2.5px solid " + bg + "55;\">" +
        "<span style=\"color:" + bg + "\">" + initials + "</span>" +
        "<div class=\"verified-ring\">" + (allVerified ? "✅" : verifPassed + "/" + LAYER_ORDER.length) + "</div>" +
      "</div>" +
      "<div class=\"hero-info\">" +
        "<div class=\"hero-name\">" + c.name + "</div>" +
        "<div class=\"hero-role\">" + c.skill + "</div>" +
        "<div class=\"hero-meta\">" +
          "<span class=\"hero-meta-item\">📍 " + c.country + "</span>" +
          "<span class=\"hero-meta-item\">⏱ " + AVAIL_LABELS[c.availability] + "</span>" +
          "<span class=\"hero-meta-item\">🗣️ English: " + (ENG_LABELS[c.english] || "Proficient") + "</span>" +
        "</div>" +
      "</div>" +
    "</div>" +
    "<div class=\"vela-master-badge\">" +
      "<div class=\"vmb-seal\">" + (allVerified ? "✅" : "⚡") + "</div>" +
      "<div class=\"vmb-info\">" +
        "<div class=\"vmb-title\">VELA " + (allVerified ? "VERIFIED" : "IN PROGRESS") + "</div>" +
        "<div class=\"vmb-score\" style=\"color:" + tier.color + "\">" + c.score + "<span style=\"font-size:0.9rem;color:var(--muted);font-weight:400\">/100</span></div>" +
        "<div class=\"vmb-tier\" style=\"color:" + tier.color + "\">" + tier.label + "</div>" +
      "</div>" +
      "<div class=\"vmb-layers\">" + layerPills + "</div>" +
    "</div>" +
  "</div>" +

  // ── PROFESSIONAL SUMMARY ───────────────────────────────────────────────────
  "<div class=\"section-card\">" +
    "<div class=\"section-header\"><span class=\"section-icon\">👤</span><span class=\"section-title\">Professional Summary</span></div>" +
    "<div class=\"section-body\"><p class=\"bio-text\">" + (c.bio || "No summary provided.") + "</p></div>" +
  "</div>" +

  // ── KEY SKILLS ─────────────────────────────────────────────────────────────
  "<div class=\"section-card\">" +
    "<div class=\"section-header\"><span class=\"section-icon\">🛠️</span><span class=\"section-title\">Key Skills & Tools</span></div>" +
    "<div class=\"section-body\">" +
      "<div class=\"skill-chips\">" + c.tools.map(function(t){ return "<span class=\"skill-chip\">" + t + "</span>"; }).join("") + "</div>" +
    "</div>" +
  "</div>" +

  // ── EXPERIENCE ─────────────────────────────────────────────────────────────
  "<div class=\"section-card\">" +
    "<div class=\"section-header\"><span class=\"section-icon\">💼</span><span class=\"section-title\">Experience & Education</span></div>" +
    "<div class=\"section-body\">" +
      "<div class=\"exp-item\">" +
        "<div class=\"exp-role\">" + c.skill + " Professional</div>" +
        "<div class=\"exp-company\">Remote Work Experience</div>" +
        "<div class=\"exp-period\">" + (EXP_LABELS[c.experience] || "Experience") + "</div>" +
      "</div>" +
      "<div class=\"exp-item\">" +
        "<div class=\"exp-role\">" + (EDU_LABELS[c.education] || "Education") + "</div>" +
        "<div class=\"exp-company\">" + (c.field || "") + "</div>" +
      "</div>" +
    "</div>" +
  "</div>" +

  // ── PORTFOLIO ──────────────────────────────────────────────────────────────
  "<div class=\"section-card\">" +
    "<div class=\"section-header\"><span class=\"section-icon\">🗂️</span><span class=\"section-title\">Portfolio & Projects</span></div>" +
    "<div class=\"section-body\">" +
      "<div class=\"portfolio-grid\">" +
        "<div class=\"port-card\"><div class=\"port-title\">Work Sample #1</div><div class=\"port-tools\">Skill: " + c.skill + "</div><a class=\"port-link\" href=\"#\">View Project →</a></div>" +
        "<div class=\"port-card\"><div class=\"port-title\">Work Sample #2</div><div class=\"port-tools\">Tools: " + (c.tools.slice(0,2).join(", ") || "") + "</div><a class=\"port-link\" href=\"#\">View Project →</a></div>" +
      "</div>" +
    "</div>" +
  "</div>" +

  // ── VELA TEST RESULTS ──────────────────────────────────────────────────────
  "<div class=\"section-card\">" +
    "<div class=\"section-header\"><span class=\"section-icon\">📊</span><span class=\"section-title\">VELA Verification Results</span></div>" +
    "<div class=\"section-body\">" + testRows + "</div>" +
  "</div>" +

  // ── VIDEO INTRO ────────────────────────────────────────────────────────────
  "<div class=\"section-card\">" +
    "<div class=\"section-header\"><span class=\"section-icon\">🎥</span><span class=\"section-title\">Video Introduction</span></div>" +
    "<div class=\"section-body\">" +
      (c.verif.video && c.verif.video.s === "pass"
        ? "<div class=\"video-slot\"><div class=\"video-slot-icon\">▶️</div><div class=\"video-slot-text\">60-second professional introduction verified by VELA.<br/><strong style=\"color:var(--text)\">Video available after contact request.</strong></div></div>"
        : "<div class=\"video-slot\"><div class=\"video-slot-icon\">🎥</div><div class=\"video-slot-text\">Video introduction pending.</div></div>") +
    "</div>" +
  "</div>" +

  // ── REMOTE READINESS ───────────────────────────────────────────────────────
  "<div class=\"section-card\">" +
    "<div class=\"section-header\"><span class=\"section-icon\">🌐</span><span class=\"section-title\">Remote Work Readiness</span></div>" +
    "<div class=\"section-body\">" +
      "<div class=\"remote-grid\">" +
        "<div class=\"remote-item\"><div class=\"remote-label\">English</div><div class=\"remote-val\">" + (ENG_LABELS[c.english] || "Proficient") + "</div></div>" +
        "<div class=\"remote-item\"><div class=\"remote-label\">Availability</div><div class=\"remote-val\">" + (AVAIL_LABELS[c.availability] || "") + "</div></div>" +
        "<div class=\"remote-item\"><div class=\"remote-label\">Time Zone</div><div class=\"remote-val\">Africa / GMT+1–3</div></div>" +
        "<div class=\"remote-item\"><div class=\"remote-label\">Remote Verified</div><div class=\"remote-val\" style=\"color:var(--accent)\">✔ Remote Ready</div></div>" +
      "</div>" +
    "</div>" +
  "</div>" +

  "</div>" + // end .left

  // ── RIGHT COLUMN ───────────────────────────────────────────────────────────
  "<div class=\"right fade-up\">" +

  // SCORE CARD
  "<div class=\"action-card\">" +
    "<div class=\"score-display\">" +
      "<div class=\"score-big\" style=\"color:" + tier.color + "\">" + c.score + "<span class=\"score-100\">/100</span></div>" +
      "<div class=\"score-tier-pill\" style=\"background:" + tier.color + "18;color:" + tier.color + ";border:1px solid " + tier.color + "40\">" + tier.label + "</div>" +
    "</div>" +
    "<button class=\"btn-request\" onclick=\"requestInterview()\">Request Interview →</button>" +
    "<button class=\"btn-shortlist\" id=\"shortlist-btn\" onclick=\"toggleShortlist()\">♡ Save to Shortlist</button>" +
  "</div>" +

  // QUICK FACTS
  "<div class=\"action-card\">" +
    "<div style=\"font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.75rem;\">Quick Facts</div>" +
    "<div class=\"quick-fact\"><span class=\"qf-label\">Location</span><span class=\"qf-val\">📍 " + c.country + "</span></div>" +
    "<div class=\"quick-fact\"><span class=\"qf-label\">Availability</span><span class=\"qf-val\">" + (AVAIL_LABELS[c.availability] || "") + "</span></div>" +
    "<div class=\"quick-fact\"><span class=\"qf-label\">Experience</span><span class=\"qf-val\">" + (EXP_LABELS[c.experience] || "") + "</span></div>" +
    "<div class=\"quick-fact\"><span class=\"qf-label\">English</span><span class=\"qf-val\">" + (ENG_LABELS[c.english] || "") + "</span></div>" +
    "<div class=\"quick-fact\"><span class=\"qf-label\">Education</span><span class=\"qf-val\">" + (EDU_LABELS[c.education] || "") + "</span></div>" +
    "<div class=\"quick-fact\"><span class=\"qf-label\">VELA Layers</span><span class=\"qf-val\" style=\"color:var(--accent)\">" + verifPassed + "/5 Verified</span></div>" +
  "</div>" +

  // SIMILAR CANDIDATES
  (similar.length > 0 ? "<div class=\"action-card\">" +
    "<div style=\"font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.75rem;\">Similar Candidates</div>" +
    similarHTML +
  "</div>" : "") +

  "</div>"; // end .right

  document.getElementById("page").innerHTML = html;

  // Animate score ring
  setTimeout(function(){
    var fills = document.querySelectorAll(".test-bar-fill");
    fills.forEach(function(f){
      var w = f.style.width;
      f.style.width = "0";
      requestAnimationFrame(function(){
        setTimeout(function(){ f.style.transition = "width 1s ease"; f.style.width = w; }, 50);
      });
    });
  }, 100);
}

function requestInterview() {
  if (!candidate) return;
  var msg = "Hello VELA,\n\nI am interested in requesting an interview with " + candidate.name + " (" + candidate.skill + ").\n\nPlease let me know next steps.\n\nThank you.";
  window.location.href = "mailto:joinvela2026@gmail.com?subject=Interview Request — " + encodeURIComponent(candidate.name) + "&body=" + encodeURIComponent(msg);
}

function toggleShortlist() {
  var btn = document.getElementById("shortlist-btn");
  if (!btn) return;
  btn.classList.toggle("active");
  btn.textContent = btn.classList.contains("active") ? "♥ Saved to Shortlist" : "♡ Save to Shortlist";
}

function toggleTheme() {
  document.body.classList.toggle("light-mode");
  var isLight = document.body.classList.contains("light-mode");
  document.getElementById("theme-btn").textContent = isLight ? "☀️" : "🌑 Dark";
  localStorage.setItem("vela_theme", isLight ? "light" : "dark");
}
function applyTheme() {
  if (localStorage.getItem("vela_theme") === "light") {
    document.body.classList.add("light-mode");
    var btn = document.getElementById("theme-btn");
    if (btn) btn.textContent = "🌌 Navy";
  }
}
document.addEventListener("DOMContentLoaded", function(){ applyTheme(); init(); });
</script>
</body>
</html>
