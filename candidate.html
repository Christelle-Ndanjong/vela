<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VELA — Candidate Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090F; --bg2: #0B0F1A; --surface: #101520;
      --border: rgba(255,255,255,0.07); --accent: #0096FF;
      --accent2: #00E5A0; --text: #F0F4FF; --muted: #6B7A99; --card: #0C1220;
    }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 5%; border-bottom: 1px solid var(--border);
      background: rgba(7,9,15,0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px);
    }
    .logo-wrap { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;
      letter-spacing: 0.08em; background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .logo-tag { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); background: rgba(0,150,255,0.1); border: 1px solid rgba(0,150,255,0.2);
      padding: 0.2rem 0.55rem; border-radius: 4px; }
    .nav-right { display: flex; gap: 0.75rem; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 0.45rem 1rem; border-radius: 7px; font-size: 0.83rem; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all 0.2s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn-primary { background: var(--accent); color: #fff; border: none; padding: 0.45rem 1.2rem;
      border-radius: 7px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      cursor: pointer; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.88; }

    /* LAYOUT */
    .page { max-width: 1100px; margin: 0 auto; padding: 2.5rem 5% 5rem;
      display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; align-items: start; }

    /* ── LEFT COLUMN ── */
    .left { display: flex; flex-direction: column; gap: 1.25rem; }

    /* HERO CARD */
    .hero-card {
      background: linear-gradient(145deg, #0C1625, #07090F);
      border: 1.5px solid rgba(0,150,255,0.2); border-radius: 20px; padding: 2rem; position: relative; overflow: hidden;
    }
    .hero-card::before { content:''; position:absolute; top:-50px; right:-50px; width:200px; height:200px;
      background: radial-gradient(circle, rgba(0,150,255,0.07), transparent 70%); border-radius:50%; }
    .hero-top { display: flex; align-items: flex-start; gap: 1.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .hero-avatar { width: 80px; height: 80px; border-radius: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: #000; }
    .hero-info { flex: 1; min-width: 0; }
    .hero-name { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 0.3rem; }
    .hero-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .hero-meta-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; color: var(--muted); }
    .vela-verified-badge { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem;
      background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2);
      display: inline-flex; padding: 0.3rem 0.75rem; border-radius: 100px;
      font-size: 0.75rem; font-weight: 700; color: var(--accent2); }
    .hero-score-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .hero-score-item { background: rgba(0,150,255,0.05); border: 1px solid rgba(0,150,255,0.1);
      border-radius: 12px; padding: 1rem; text-align: center; }
    .hsi-val { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; margin-bottom: 0.2rem; }
    .hsi-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* SECTION CARD */
    .section-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; }
    .section-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
    .section-title { font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
      color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    .section-body { padding: 1.5rem; }

    /* BIO */
    .bio-text { font-size: 0.92rem; color: var(--muted); line-height: 1.7; }

    /* VERIFICATION DETAILS */
    .verif-detail-list { display: flex; flex-direction: column; gap: 1rem; }
    .vd-item { border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; }
    .vd-item.pass-item { border-color: rgba(0,229,160,0.2); }
    .vd-item.pending-item { border-color: var(--border); opacity: 0.6; }
    .vd-item.review-item { border-color: rgba(255,165,0,0.2); }
    .vd-header { display: flex; align-items: center; gap: 0.85rem; padding: 0.9rem 1rem;
      background: rgba(255,255,255,0.02); }
    .vd-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center;
      justify-content: center; font-size: 0.9rem; flex-shrink: 0; }
    .vd-icon.pass { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.2); }
    .vd-icon.review { background: rgba(255,165,0,0.1); border: 1px solid rgba(255,165,0,0.2); }
    .vd-icon.pending { background: var(--surface); border: 1px solid var(--border); }
    .vd-title { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; color: var(--text); flex: 1; }
    .vd-status-pill { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      padding: 0.2rem 0.6rem; border-radius: 100px; }
    .vd-status-pill.pass { background: rgba(0,229,160,0.1); color: var(--accent2); border: 1px solid rgba(0,229,160,0.2); }
    .vd-status-pill.review { background: rgba(255,165,0,0.1); color: #FFA500; border: 1px solid rgba(255,165,0,0.2); }
    .vd-status-pill.pending { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .vd-score { font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 800; margin-left: 0.5rem; }
    .vd-body { padding: 0.85rem 1rem; border-top: 1px solid var(--border); }
    .vd-feedback { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
    .vd-bar-wrap { margin-top: 0.6rem; }
    .vd-bar-track { height: 4px; background: var(--surface); border-radius: 100px; overflow: hidden; }
    .vd-bar-fill { height: 100%; border-radius: 100px; }

    /* TOOLS */
    .tools-wrap { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .tool-badge { background: var(--surface); border: 1px solid var(--border); color: var(--text);
      font-size: 0.8rem; font-weight: 500; padding: 0.35rem 0.85rem; border-radius: 8px; }

    /* EXPERIENCE / EDUCATION */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .info-item { }
    .info-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    .info-val { font-size: 0.88rem; color: var(--text); font-weight: 500; }

    /* ── RIGHT COLUMN ── */
    .right { display: flex; flex-direction: column; gap: 1.25rem; position: sticky; top: 80px; }

    /* SCORE CARD */
    .score-card {
      background: linear-gradient(145deg, #0C1625, #07090F);
      border: 1.5px solid rgba(0,150,255,0.25); border-radius: 18px;
      padding: 1.75rem; text-align: center;
    }
    .score-ring-wrap { position: relative; width: 130px; height: 130px; margin: 0 auto 1.25rem; }
    .score-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .score-ring-track { fill: none; stroke: var(--surface); stroke-width: 7; }
    .score-ring-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
    .score-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-num { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; line-height: 1; }
    .score-denom { font-size: 0.68rem; color: var(--muted); }
    .score-label-val { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; margin-bottom: 0.25rem; }
    .score-hint { font-size: 0.78rem; color: var(--muted); line-height: 1.5; margin-bottom: 1.25rem; }
    .score-breakdown { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
    .sb-row { display: flex; align-items: center; gap: 0.5rem; }
    .sb-label { font-size: 0.7rem; color: var(--muted); width: 72px; text-align: right; flex-shrink: 0; }
    .sb-track { flex: 1; height: 3px; background: var(--surface); border-radius: 100px; overflow: hidden; }
    .sb-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .sb-val { font-size: 0.65rem; color: var(--muted); width: 28px; font-family: 'Syne', sans-serif; font-weight: 700; }

    .btn-contact-full { width: 100%; background: var(--accent); color: #fff; border: none;
      padding: 0.9rem; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s; margin-bottom: 0.6rem; }
    .btn-contact-full:hover { opacity: 0.88; }
    .btn-shortlist-full { width: 100%; background: transparent; border: 1.5px solid var(--border);
      color: var(--muted); padding: 0.85rem; border-radius: 10px; font-family: 'Syne', sans-serif;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .btn-shortlist-full:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn-shortlist-full.shortlisted { border-color: rgba(0,229,160,0.4); color: var(--accent2); background: rgba(0,229,160,0.06); }

    /* QUICK FACTS */
    .quick-facts { display: flex; flex-direction: column; gap: 0.75rem; }
    .qf-item { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .qf-label { font-size: 0.78rem; color: var(--muted); }
    .qf-val { font-size: 0.82rem; font-weight: 600; color: var(--text); text-align: right; }

    /* SIMILAR */
    .similar-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .similar-card { display: flex; align-items: center; gap: 0.75rem;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.75rem; cursor: pointer; transition: border-color 0.2s; text-decoration: none; color: inherit; }
    .similar-card:hover { border-color: rgba(0,150,255,0.3); }
    .similar-avatar { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.8rem; color: #000; }
    .similar-name { font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--text); }
    .similar-meta { font-size: 0.72rem; color: var(--muted); }
    .similar-score { font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 800; margin-left: auto; flex-shrink: 0; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.35s ease both; }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .right { position: static; }
      .info-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .hero-score-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo-wrap" href="employers.html">
    <span class="logo">VELA</span>
    <span class="logo-tag">For Employers</span>
  </a>
  <div class="nav-right">
    <a class="btn-ghost" href="talent.html">← Browse Talent</a>
    <button class="btn-primary" onclick="contactCandidate()">Contact Candidate →</button>
  </div>
</nav>

<div class="page" id="page">
  <div style="text-align:center;padding:4rem;color:var(--muted);grid-column:1/-1">Loading candidate profile...</div>
</div>

<script>
const AVATAR_COLORS = [
  ["#00E5A0","#006640"],["#0096FF","#003A66"],["#A855F7","#4A1580"],
  ["#F59E0B","#6B4400"],["#EF4444","#6B1A1A"],["#10B981","#065F46"],
  ["#F97316","#7A3B10"],["#06B6D4","#0E4D5C"],
];

const CANDIDATES = [
  { id:1,  name:"Amara Osei",       country:"Ghana",        skill:"Data Analysis",           score:82, english:4, availability:"fulltime",  experience:"1to3",  verif:{comm:{s:"pass",score:88,feedback:"Strong professional tone and well-structured response. Demonstrated clear data communication skills. Minor improvements in brevity recommended."},tools:{s:"pass",score:90,feedback:"Excellent tool knowledge. Scored 9/10 on SQL, Excel and Python questions."},interview:{s:"pass",score:79,feedback:"Good depth in answers. Used specific examples effectively. Could strengthen quantitative impact in responses."},task:{s:"review",score:null,feedback:"Work sample submitted and under review by VELA team."},video:{s:"review",score:null,feedback:"Video introduction under review."}}, tools:["Excel","SQL","Python","Tableau","Power BI","Google Sheets"], education:"master", field:"Mathematics", joined:"2026-01-15", bio:"MSc Mathematics graduate with 2 years of data analysis experience in fintech. Built automated reporting dashboards that reduced weekly reporting time by 60%. Proficient in statistical modelling and business intelligence.", goal:"To work as a remote data analyst for a growth-stage company, contributing to data-driven decisions while building towards a senior analytics role." },
  { id:2,  name:"Fatima Al-Hassan", country:"Nigeria",       skill:"Customer Service",         score:91, english:5, availability:"fulltime",  experience:"3plus", verif:{comm:{s:"pass",score:94,feedback:"Exceptional professional communication. Empathetic, clear, and solution-focused. One of the strongest responses reviewed."},tools:{s:"pass",score:88,feedback:"Strong across Zendesk and HubSpot. Minor gaps in Salesforce advanced features."},interview:{s:"pass",score:90,feedback:"Outstanding interview responses. Highly specific examples with measurable outcomes. Excellent candidate."},task:{s:"pass",score:null,feedback:"Task simulation reviewed and approved by VELA team."},video:{s:"pass",score:null,feedback:"Video introduction reviewed and approved. Professional, confident, and articulate."}}, tools:["Zendesk","HubSpot","Slack","Intercom","Salesforce","Freshdesk"], education:"bachelor", field:"Business Administration", joined:"2026-01-08", bio:"5 years customer service experience across e-commerce and SaaS companies. Previously managed a team of 12 support agents handling 300+ daily tickets. Consistently maintained CSAT above 96%.", goal:"Senior customer success role at a remote-first SaaS company." },
  { id:3,  name:"Kwame Asante",     country:"Ghana",         skill:"Project Management",       score:76, english:4, availability:"fulltime",  experience:"3plus", verif:{comm:{s:"pass",score:82,feedback:"Clear and professional communication. Well-organised response demonstrating PM thinking."},tools:{s:"pass",score:85,feedback:"Solid Jira and Asana knowledge. Strong Agile methodology understanding."},interview:{s:"pass",score:74,feedback:"Good answers with relevant examples. Could be more specific on quantitative project outcomes."},task:{s:"review",score:null,feedback:"Case study document under review."},video:{s:"pending",score:null,feedback:"Not yet submitted."}}, tools:["Jira","Asana","Monday.com","Slack","MS Project","ClickUp"], education:"bachelor", field:"Engineering", joined:"2026-01-22", bio:"PMP-certified project manager with 4 years of experience delivering software projects. Managed cross-functional teams of up to 20 people across 3 time zones.", goal:"Senior PM role leading remote agile teams at a tech company." },
  { id:4,  name:"Zara Diallo",      country:"Senegal",       skill:"Social Media Management",  score:88, english:4, availability:"parttime",  experience:"1to3",  verif:{comm:{s:"pass",score:86,feedback:"Professional and engaging writing style. Good brand voice awareness."},tools:{s:"pass",score:92,feedback:"Excellent platform knowledge. Particularly strong on Meta Business Suite and Buffer."},interview:{s:"pass",score:85,feedback:"Strong answers with concrete results and metrics. Demonstrated strategic thinking."},task:{s:"pass",score:null,feedback:"Social media portfolio reviewed and approved."},video:{s:"review",score:null,feedback:"Video under review."}}, tools:["Canva","Buffer","Meta Business Suite","Later","Hootsuite","CapCut"], education:"bachelor", field:"Communications", joined:"2026-02-01", bio:"Built a 50k+ following for a D2C skincare brand from scratch. Specialist in Instagram Reels and LinkedIn content. Increased brand engagement 3x in 6 months.", goal:"Social media lead role for a consumer brand, focusing on organic growth strategy." },
  { id:15, name:"Tunde Adeyemi",    country:"Nigeria",       skill:"Prompt Engineering & AI",  score:94, english:5, availability:"fulltime",  experience:"1to3",  verif:{comm:{s:"pass",score:96,feedback:"Exceptional clarity and precision. Demonstrates sophisticated understanding of AI communication."},tools:{s:"pass",score:98,feedback:"Near-perfect tool knowledge. Outstanding across all AI platforms and automation tools."},interview:{s:"pass",score:92,feedback:"Excellent interview performance. Highly specific, thoughtful and technically impressive answers."},task:{s:"pass",score:null,feedback:"AI workflow portfolio reviewed and approved. Impressive range of automations demonstrated."},video:{s:"pass",score:null,feedback:"Video reviewed and approved. Highly professional and articulate."}}, tools:["ChatGPT","Claude","Make.com","LangChain","Zapier","Midjourney","Gemini","Perplexity"], education:"bachelor", field:"Computer Science", joined:"2026-01-15", bio:"AI workflow specialist who has automated 40+ business processes for SMEs across e-commerce, consulting, and marketing. Built full AI customer service pipelines reducing response time by 80%.", goal:"Head of AI Automation at a forward-thinking company building the next generation of AI-assisted workflows." },
  { id:18, name:"Precious Obi",     country:"Nigeria",       skill:"Social Media Management",  score:95, english:5, availability:"fulltime",  experience:"3plus", verif:{comm:{s:"pass",score:96,feedback:"Outstanding professional communication. Clear, engaging, and brand-aware writing."},tools:{s:"pass",score:94,feedback:"Expert-level platform knowledge across all major platforms."},interview:{s:"pass",score:95,feedback:"Exceptional interview answers. Specific metrics, clear strategy, outstanding candidate."},task:{s:"pass",score:null,feedback:"Portfolio reviewed and approved. Exceptional content quality and results demonstrated."},video:{s:"pass",score:null,feedback:"Video reviewed. Charismatic, professional, and highly compelling."}}, tools:["Canva","Buffer","Hootsuite","CapCut","TikTok","Meta Business Suite","Sprout Social","Later"], education:"bachelor", field:"Marketing", joined:"2026-01-28", bio:"Grew a brand from 2k to 280k followers in 12 months. TikTok and Instagram specialist. Managed social presence for 3 brands simultaneously. One campaign generated $200k in direct revenue.", goal:"Head of Social at a high-growth consumer brand." },
];

const VERIF_LAYER_META = {
  comm:      { icon:"✍️", title:"Communication Test",       auto:true  },
  tools:     { icon:"🛠️", title:"Tool Knowledge Assessment", auto:true  },
  interview: { icon:"💬", title:"Mock Interview",             auto:true  },
  task:      { icon:"📁", title:"Task Simulation",            auto:false },
  video:     { icon:"🎥", title:"Video Introduction",         auto:false },
};

const ENG_LABELS   = {3:"Intermediate",4:"Proficient",5:"Fluent"};
const AVAIL_LABELS = {fulltime:"Full-time (30–40h/week)",parttime:"Part-time (10–20h/week)",flexible:"Flexible hours"};
const EXP_LABELS   = {none:"No prior experience",less1:"Under 1 year",["1to3"]:"1–3 years",["3plus"]:"3+ years"};
const EDU_LABELS   = {secondary:"Secondary School",diploma:"Diploma / HND",bachelor:"Bachelor's Degree",master:"Master's Degree",phd:"PhD / Doctorate"};

let candidate = null;
let isShortlisted = false;

function init() {
  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get("id")) || 1;
  candidate = CANDIDATES.find(c => c.id === id) || CANDIDATES[0];
  renderProfile();
}

function renderProfile() {
  const c = candidate;
  const colorIdx = c.id % AVATAR_COLORS.length;
  const [bg] = AVATAR_COLORS[colorIdx];
  const initials = c.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const verifPassed = Object.values(c.verif).filter(v => v.s === "pass").length;
  const scoreColor = c.score >= 80 ? "#00E5A0" : c.score >= 65 ? "#0096FF" : "#FFA500";
  const circumference = 2 * Math.PI * 56;
  const offset = circumference - (c.score/100) * circumference;

  const similar = CANDIDATES.filter(x => x.id !== c.id && x.skill === c.skill).slice(0,3);

  document.getElementById("page").innerHTML = `
    <!-- LEFT -->
    <div class="left fade-up">

      <!-- HERO CARD -->
      <div class="hero-card">
        <div class="hero-top">
          <div class="hero-avatar" style="background:linear-gradient(135deg,${bg}22,${bg}44);border:2px solid ${bg}44;color:${bg}">${initials}</div>
          <div class="hero-info">
            <div class="hero-name">${c.name}</div>
            <div class="hero-meta">
              <div class="hero-meta-item">📍 ${c.country}</div>
              <div class="hero-meta-item">🎯 ${c.skill}</div>
              <div class="hero-meta-item">⏰ ${AVAIL_LABELS[c.availability]}</div>
            </div>
            <div style="margin-top:0.75rem">
              <span class="vela-verified-badge">⚡ ${verifPassed}/5 VELA Verified</span>
            </div>
          </div>
        </div>
        <div class="hero-score-row">
          <div class="hero-score-item">
            <div class="hsi-val" style="color:${scoreColor}">${c.score}</div>
            <div class="hsi-label">Readiness Score</div>
          </div>
          <div class="hero-score-item">
            <div class="hsi-val" style="color:var(--accent2)">${verifPassed}/5</div>
            <div class="hsi-label">Verifications</div>
          </div>
          <div class="hero-score-item">
            <div class="hsi-val" style="color:var(--accent)">${ENG_LABELS[c.english]||"—"}</div>
            <div class="hsi-label">English Level</div>
          </div>
        </div>
      </div>

      <!-- BIO -->
      <div class="section-card">
        <div class="section-header"><div class="section-title">👤 About ${c.name.split(" ")[0]}</div></div>
        <div class="section-body">
          <p class="bio-text">${c.bio}</p>
          ${c.goal ? `<p class="bio-text" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)"><strong style="color:var(--text)">Goal:</strong> ${c.goal}</p>` : ""}
        </div>
      </div>

      <!-- VERIFICATION EVIDENCE -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">⚡ Verification Evidence
            <span style="font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:400;color:var(--muted);margin-left:0.5rem">All scores independently assessed — not self-reported</span>
          </div>
        </div>
        <div class="section-body">
          <div class="verif-detail-list">
            ${Object.entries(c.verif).map(([key, data]) => {
              const meta = VERIF_LAYER_META[key];
              const s = data.s;
              const scoreColor = data.score >= 80 ? "#00E5A0" : data.score >= 65 ? "#0096FF" : "#FFA500";
              return `
                <div class="vd-item ${s}-item">
                  <div class="vd-header">
                    <div class="vd-icon ${s}">${meta.icon}</div>
                    <div class="vd-title">${meta.title}</div>
                    ${meta.auto ? `<span style="font-size:0.65rem;color:var(--accent);background:rgba(0,150,255,0.08);padding:0.15rem 0.5rem;border-radius:4px;border:1px solid rgba(0,150,255,0.15)">AI scored</span>` : `<span style="font-size:0.65rem;color:var(--muted);background:var(--surface);padding:0.15rem 0.5rem;border-radius:4px;border:1px solid var(--border)">Human reviewed</span>`}
                    ${data.score !== null && data.score !== undefined ? `<div class="vd-score" style="color:${scoreColor}">${data.score}/100</div>` : ""}
                    <div class="vd-status-pill ${s}">${s==="pass"?"Passed":s==="review"?"In Review":"Pending"}</div>
                  </div>
                  ${data.feedback ? `
                    <div class="vd-body">
                      <div class="vd-feedback">${data.feedback}</div>
                      ${data.score ? `
                        <div class="vd-bar-wrap">
                          <div class="vd-bar-track">
                            <div class="vd-bar-fill" style="width:${data.score}%;background:linear-gradient(90deg,${scoreColor}88,${scoreColor})"></div>
                          </div>
                        </div>` : ""}
                    </div>` : ""}
                </div>`;
            }).join("")}
          </div>
        </div>
      </div>

      <!-- TOOLS -->
      <div class="section-card">
        <div class="section-header"><div class="section-title">🛠️ Tools & Platforms</div></div>
        <div class="section-body">
          <div class="tools-wrap">
            ${c.tools.map(t => `<span class="tool-badge">${t}</span>`).join("")}
          </div>
        </div>
      </div>

      <!-- BACKGROUND -->
      <div class="section-card">
        <div class="section-header"><div class="section-title">📋 Background</div></div>
        <div class="section-body">
          <div class="info-grid">
            <div class="info-item"><div class="info-label">Education</div><div class="info-val">${EDU_LABELS[c.education]||"—"}</div></div>
            <div class="info-item"><div class="info-label">Field of Study</div><div class="info-val">${c.field||"—"}</div></div>
            <div class="info-item"><div class="info-label">Experience</div><div class="info-val">${EXP_LABELS[c.experience]||"—"}</div></div>
            <div class="info-item"><div class="info-label">Location</div><div class="info-val">${c.country}, Africa</div></div>
            <div class="info-item"><div class="info-label">Availability</div><div class="info-val">${AVAIL_LABELS[c.availability]||"—"}</div></div>
            <div class="info-item"><div class="info-label">Profile Since</div><div class="info-val">${new Date(c.joined).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right fade-up" style="animation-delay:0.08s">

      <!-- SCORE CARD -->
      <div class="score-card">
        <div class="score-ring-wrap">
          <svg viewBox="0 0 130 130" width="130" height="130">
            <circle class="score-ring-track" cx="65" cy="65" r="56"/>
            <circle class="score-ring-fill" cx="65" cy="65" r="56"
              stroke="${scoreColor}" stroke-dasharray="${circumference.toFixed(1)}"
              stroke-dashoffset="${circumference.toFixed(1)}" id="score-ring"/>
          </svg>
          <div class="score-center">
            <div class="score-num" style="color:${scoreColor}" id="score-display">0</div>
            <div class="score-denom">/ 100</div>
          </div>
        </div>
        <div class="score-label-val" style="color:${scoreColor}">${c.score>=90?"Exceptional":c.score>=80?"Strong Candidate":c.score>=70?"Good Candidate":"Developing"}</div>
        <div class="score-hint">VELA Readiness Score — based on education, experience, verified assessments, and tools.</div>

        <div class="score-breakdown">
          ${[
            {l:"Education",    v:({secondary:4,diploma:8,bachelor:14,master:18,phd:20}[c.education]||6),   max:20},
            {l:"Experience",   v:({none:0,less1:5,"1to3":10,"3plus":15}[c.experience]||0),                max:15},
            {l:"Verifications",v:Math.min(Object.values(c.verif).filter(x=>x.s==="pass").length*4,20),    max:20},
            {l:"English",      v:(c.english||0)*3,                                                        max:15},
            {l:"Tools",        v:Math.min(c.tools.length*2,15),                                           max:15},
          ].map(b=>`
            <div class="sb-row">
              <div class="sb-label">${b.l}</div>
              <div class="sb-track"><div class="sb-fill" style="width:${Math.round((b.v/b.max)*100)}%"></div></div>
              <div class="sb-val">${b.v}/${b.max}</div>
            </div>`).join("")}
        </div>

        <button class="btn-contact-full" onclick="contactCandidate()">Contact ${c.name.split(" ")[0]} →</button>
        <button class="btn-shortlist-full ${isShortlisted?"shortlisted":""}" id="sl-btn" onclick="toggleShortlist()">
          ${isShortlisted?"♥ Shortlisted":"♡ Add to Shortlist"}
        </button>
      </div>

      <!-- QUICK FACTS -->
      <div class="section-card">
        <div class="section-header"><div class="section-title">⚡ Quick Facts</div></div>
        <div class="section-body">
          <div class="quick-facts">
            <div class="qf-item"><span class="qf-label">Skill Path</span><span class="qf-val">${c.skill}</span></div>
            <div class="qf-item"><span class="qf-label">Location</span><span class="qf-val">${c.country}</span></div>
            <div class="qf-item"><span class="qf-label">Availability</span><span class="qf-val">${c.availability==="fulltime"?"Full-time":c.availability==="parttime"?"Part-time":"Flexible"}</span></div>
            <div class="qf-item"><span class="qf-label">English</span><span class="qf-val">${ENG_LABELS[c.english]||"—"}</span></div>
            <div class="qf-item"><span class="qf-label">Experience</span><span class="qf-val">${EXP_LABELS[c.experience]||"—"}</span></div>
            <div class="qf-item"><span class="qf-label">Education</span><span class="qf-val">${EDU_LABELS[c.education]||"—"}</span></div>
            <div class="qf-item"><span class="qf-label">Verifications</span><span class="qf-val" style="color:${scoreColor}">${verifPassed}/5 Complete</span></div>
          </div>
        </div>
      </div>

      ${similar.length ? `
      <!-- SIMILAR CANDIDATES -->
      <div class="section-card">
        <div class="section-header">
          <div class="section-title">👥 Similar Candidates</div>
        </div>
        <div class="section-body">
          <div class="similar-list">
            ${similar.map(s => {
              const [sbg] = AVATAR_COLORS[s.id % AVATAR_COLORS.length];
              const si = s.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
              const sc = s.score >= 80 ? "#00E5A0" : s.score >= 65 ? "#0096FF" : "#FFA500";
              return `
                <a class="similar-card" href="candidate.html?id=${s.id}">
                  <div class="similar-avatar" style="background:linear-gradient(135deg,${sbg}22,${sbg}44);color:${sbg};border:1.5px solid ${sbg}33">${si}</div>
                  <div>
                    <div class="similar-name">${s.name}</div>
                    <div class="similar-meta">${s.country} · ${s.skill}</div>
                  </div>
                  <div class="similar-score" style="color:${sc}">${s.score}</div>
                </a>`;
            }).join("")}
          </div>
        </div>
      </div>` : ""}

    </div>`;

  // Animate score ring
  setTimeout(() => {
    const ring = document.getElementById("score-ring");
    if (ring) ring.style.strokeDashoffset = offset.toFixed(1);
    let count = 0;
    const disp = document.getElementById("score-display");
    const interval = setInterval(() => {
      count = Math.min(count + 2, c.score);
      if (disp) disp.textContent = count;
      if (count >= c.score) clearInterval(interval);
    }, 20);
  }, 300);

  document.title = `VELA — ${c.name} · ${c.skill}`;
}

function toggleShortlist() {
  isShortlisted = !isShortlisted;
  const btn = document.getElementById("sl-btn");
  if (btn) {
    btn.className = `btn-shortlist-full ${isShortlisted?"shortlisted":""}`;
    btn.textContent = isShortlisted ? `♥ Shortlisted` : `♡ Add to Shortlist`;
  }
}

function contactCandidate() {
  if (!candidate) return;
  const msg = `📧 Contact request for ${candidate.name}\n\nIn production, this would:\n1. Send your company details to VELA\n2. VELA facilitates the introduction\n3. You connect directly with ${candidate.name.split(" ")[0]}\n\nOne placement fee of $299 applies on successful hire.`;
  alert(msg);
}

init();
</script>
</body>
</html>
