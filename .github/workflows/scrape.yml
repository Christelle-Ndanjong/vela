name: Daily Job Scraper

on:
  schedule:
    # Runs every day at 06:00 UTC (8am Lagos / 9am Nairobi)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run VELA job scraper
        run: python scraper.py

      - name: Check if jobs.json was updated
        id: check
        run: |
          if git diff --quiet jobs.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated jobs.json
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "VELA Scraper Bot"
          git config user.email "actions@github.com"
          git add jobs.json
          git commit -m "chore: update jobs.json [$(date '+%Y-%m-%d')]"
          git push
